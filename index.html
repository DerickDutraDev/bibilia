<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Jesus Virtual</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="card">
        <h1>🙏 Jesus Virtual</h1>
        <p class="subtitle">Converse com Jesus em tempo real</p>

        <div class="avatar">
          <img id="face" src="./jesus-avatar.png" alt="Jesus Virtual" />
        </div>

        <button
          id="mic-btn"
          class="mic-btn"
          aria-pressed="false"
          aria-label="Iniciar chamada de voz"
        >
          🎤
        </button>
        <p id="status" class="status">Toque no microfone para conversar</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
